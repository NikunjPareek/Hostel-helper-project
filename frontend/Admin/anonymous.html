<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anonymous Feedback | JECRC Hostel Admin</title>
  <link rel="stylesheet" href="css/header.css">
  <link rel="stylesheet" href="css/anonymous.css">
  <link rel="icon" type="image/x-icon" href="../assets/icons/favicon.ico">
</head>
<body>
  
  <!-- Header -->
  <div id="header"></div>

  <!-- Main Content -->
  <main class="page-content">
    
    <!-- Page Header -->
    <div class="page-title-row">
      <div class="title-with-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
          <line x1="1" y1="1" x2="23" y2="23"/>
        </svg>
        <h1>Anonymous Feedback</h1>
      </div>
      <p>Identity-protected view - Student names, rooms, and phone numbers are hidden</p>
    </div>

    <!-- Privacy Notice -->
    <div class="privacy-notice">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
        <line x1="1" y1="1" x2="23" y2="23"/>
      </svg>
      <p>
        <span class="privacy-label">Privacy Mode Active:</span> 
        All personal identifiers (name, room number, phone) have been removed from this view to protect student privacy.
      </p>
    </div>

    <!-- Cards Grid -->
    <div class="cards-grid" id="feedbackGrid">
      <!-- Cards will be dynamically inserted here -->
    </div>

    <!-- Empty State -->
    <div class="empty-state" id="emptyState" style="display: none;">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
      <p>No feedback available</p>
    </div>

  </main>

  <!-- Scripts -->
  <script src="js/header.js"></script>
  <script src="js/anonymous.js"></script>
</body>
</html>
