<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard | JECRC Hostel Admin</title>
  <link rel="stylesheet" href="css/header.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="icon" type="image/x-icon" href="../assets/icons/favicon.ico">
</head>
<body>
  
  <!-- Header -->
  <div id="header"></div>

  <!-- Main Content -->
  <main class="page-content">
    
    <!-- Page Header -->
    <div class="page-title-row">
      <h1>Dashboard</h1>
      <p>Hostel management overview and advanced component metrics</p>
    </div>

    <!-- Stats Cards Grid -->
    <div class="stat-grid" id="statsGrid">
      <!-- Dynamically populated from JS -->
    </div>

    <!-- Middle Row - Poll Results + Sidebar -->
    <div class="mid-row">
      
      <!-- Poll Results Card -->
      <div class="card poll-card">
        <div class="card-header">
          <h3 class="card-title">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
              <circle cx="9" cy="7" r="4"/>
              <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
              <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
            </svg>
            Student Poll Results
          </h3>
          <div style="display: flex; align-items: center; gap: 12px;">
            <span class="poll-votes-count" id="totalVotes"></span>
            <button class="btn-primary-sm" id="btnOpenPollModal">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
              Create Poll
            </button>
          </div>
        </div>
        <div class="card-content">
          <p class="poll-question" id="pollQuestion"></p>
          <div id="pollBars">
             <!-- Poll tracks dynamically inserted here -->
          </div>
        </div>
      </div>

      <!-- Sidebar -->
      <div class="side-col">
        
        <!-- Category Breakdown -->
        <div class="card">
          <div class="card-header">
            <h3 class="card-title">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
              </svg>
              By Category
            </h3>
          </div>
          <div class="card-content" style="padding: 16px 24px;">
            <div id="categoryList">
              <!-- Category lines dynamically inserted here -->
            </div>
          </div>
        </div>

        <!-- Mini Stats -->
        <div class="card extra-card">
          <div class="card-content" style="padding: 16px 24px;">
            <div id="miniStatsList">
              <!-- Mini Stat rows dynamically inserted here -->
            </div>
          </div>
        </div>

      </div>
    </div>

    <!-- Recent Activity Card -->
    <div class="card activity-card">
      <div class="card-header">
        <h3 class="card-title">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
          </svg>
          Recent Admin Activity
        </h3>
      </div>
      <div class="card-content" style="padding: 0 24px 8px 24px;">
        <div id="activityList">
          <!-- Activity items dynamically inserted here -->
        </div>
      </div>
    </div>

  </main>

  <!-- Create Poll Modal Module -->
  <div class="modal-overlay" id="pollModal">
    <div class="modal-box" style="max-width: 520px;">
      <div class="modal-header">
        <h2 style="font-size: 20px; font-weight: 700; color: #111827; margin: 0;">Create New Poll</h2>
        <button class="modal-close" id="closePollModal">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
      </div>
      <div class="modal-content" style="display: flex; flex-direction: column; gap: 20px; padding: 24px;">
        
        <div class="modal-section">
          <label style="font-size: 13px; font-weight: 700; color: #6b7280; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; display: block;">Poll Question</label>
          <input type="text" id="newPollQuestion" placeholder="e.g. What should be the weekend special meal?" style="width: 100%; padding: 11px 14px; border: 1.5px solid #e5e7eb; border-radius: 8px; font-size: 14px; outline: none; font-family: inherit; color: #111827;">
        </div>
        
        <div class="modal-section">
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
            <label style="font-size: 13px; font-weight: 700; color: #6b7280; text-transform: uppercase; letter-spacing: 0.5px; margin: 0; display: block;">Options</label>
          </div>
          <div id="pollOptionsContainer" style="display: flex; flex-direction: column; gap: 10px;">
            <div style="display: flex; gap: 8px; align-items: center;">
              <input type="text" class="poll-option-input" placeholder="Option 1" style="flex: 1; padding: 11px 14px; border: 1.5px solid #e5e7eb; border-radius: 8px; font-size: 14px; outline: none; font-family: inherit; color: #111827;">
            </div>
            <div style="display: flex; gap: 8px; align-items: center;">
              <input type="text" class="poll-option-input" placeholder="Option 2" style="flex: 1; padding: 11px 14px; border: 1.5px solid #e5e7eb; border-radius: 8px; font-size: 14px; outline: none; font-family: inherit; color: #111827;">
            </div>
          </div>
          <button id="addPollOptionBtn" style="margin-top: 12px; display: inline-flex; justify-content: center; align-items: center; gap: 6px; padding: 10px; width: 100%; background: transparent; color: #2563eb; border: 1.5px dashed #bfdbfe; font-size: 13px; font-weight: 600; border-radius: 8px; cursor: pointer; transition: background 0.2s;">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg> Add Option
          </button>
        </div>

      </div>
      <div class="modal-actions" style="padding: 16px 24px; border-top: 1px solid #f3f4f6; display: flex; justify-content: flex-end; gap: 12px;">
        <button id="cancelPollModal" style="padding: 10px 22px; background: transparent; color: #374151; border: 1.5px solid #d1d5db; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s;">Cancel</button>
        <button id="savePollBtn" style="padding: 10px 22px; background: #c62828; color: white; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s;">Publish Poll</button>
      </div>
    </div>
  </div>

  <div id="toastContainer" class="toast-container"></div>

  <script src="js/header.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
