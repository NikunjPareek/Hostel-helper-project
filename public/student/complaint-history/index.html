<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complaint History | JECRC Hostel</title>
    <link rel="stylesheet" href="../Admin/css/header.css">
    <link rel="stylesheet" href="css/complaint_history.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Manrope:wght@500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div id="header"></div>

    <main class="page-content">
        <div class="page-header">
            <span class="badge badge-brand">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><path d="M16 13H8"/><path d="M16 17H8"/><path d="M10 9H8"/></svg>
                History Logs
            </span>
            <h1 class="page-title">My Tracked Issues</h1>
            <p class="page-subtitle">View and monitor the resolution status of all your registered reports. Anonymous submissions are not indexed here for maximum privacy.</p>
        </div>

        <div class="controls-bar">
            <div class="filter-group">
                <span class="filter-label">Filter by:</span>
                <div class="custom-select-wrapper" id="statusFilter">
                    <div class="custom-select-trigger">
                        <span class="selected-text">All Issues</span>
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg>
                    </div>
                    <div class="custom-options">
                        <div class="custom-option selected" data-value="All">All Issues</div>
                        <div class="custom-option" data-value="Submitted">Submitted</div>
                        <div class="custom-option" data-value="Pending">Pending</div>
                        <div class="custom-option" data-value="Resolved">Resolved</div>
                    </div>
                </div>
            </div>

            <div class="action-group">
                <button class="btn-ghost" onclick="renderHistory()">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/></svg>
                    Sync
                </button>
                <button class="btn-primary" onclick="window.location.href='complaint.html'">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    New Issue
                </button>
            </div>
        </div>

        <!-- Rendered Card Grid -->
        <div class="history-grid" id="historyGrid"></div>

    </main>

    <div id="footer"></div>
    <script src="../../js/api.js"></script>`n    <script src="js/complaint_history.js"></script>
</body>
</html>
