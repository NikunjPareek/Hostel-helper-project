
<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | JECRC Hostel Helper</title>

<link rel="stylesheet" href="/login/login.css">
</head>

<body>

<div class="page-wrapper">

    <!-- Header -->
    <div class="login-header">

        <div class="logo-box">
            <img src="/assets/jecrc+jmch logo.png" alt="JECRC Logo">
        </div>

        <h1>JECRC Hostel Helper</h1>

    </div>

    <!-- Login Card -->
    <div class="login-card">

        <form id="loginForm">

            <!-- Username -->
            <div class="form-field">

                <label>USERNAME</label>

                <div class="input-group">

                    <span class="input-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18"
                        viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                            <circle cx="12" cy="7" r="4"></circle>
                        </svg>
                    </span>

                    <input
                        type="text"
                        id="username"
                        placeholder="Enter username"
                        required
                    >

                </div>

            </div>


            <!-- Password -->
            <div class="form-field">

                <label>PASSWORD</label>

                <div class="input-group">

                    <span class="input-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18"
                        viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="11" width="18" height="11" rx="2"></rect>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                        </svg>
                    </span>

                    <input
                        type="password"
                        id="password"
                        placeholder="Enter password"
                        required
                    >

                </div>

            </div>

            <!-- Role Selector -->
            <div class="form-field">
                <label>LOGIN AS</label>
                <div class="role-toggle">
                    <button type="button" class="role-btn active" id="roleStudent" data-role="student">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>
                        Student
                    </button>
                    <button type="button" class="role-btn" id="roleAdmin" data-role="admin">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M6 20v-2a6 6 0 0 1 12 0v2"/><path d="m9 11 2 2 4-4"/></svg>
                        Admin
                    </button>
                </div>
                <input type="hidden" id="selectedRole" value="student">
            </div>

            <p id="formError" class="form-error"></p>

            <button class="submit-btn" type="submit" id="signInBtn">
                Sign In
            </button>

        </form>

    </div>

</div>

<script src="/js/api.js"></script>
<script src="/login/login.js"></script>

</body>
</html>
